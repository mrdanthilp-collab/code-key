<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access</title>
    <style>
        body { background: #0c0c10; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { background: #13131a; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        input { background: #0c0c10; color: #00ff7f; border: 1px solid #444; padding: 10px; width: 250px; text-align: center; font-weight: bold; }
        button { background: #8a2be2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:white">Access Key</h2>
        <input type="text" id="k" value="KEY_2026_CYBER_PRO" readonly>
        <br>
        <button onclick="c()">Copy Key</button>
    </div>
    <script>
        function c() {
            var t = document.getElementById("k");
            t.select();
            document.execCommand("copy");
            alert("Key Copied!");
        }
    </script>
</body>
</html>
