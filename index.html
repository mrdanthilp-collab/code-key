<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowa Engine - Key System</title>
    <style>
        body {
            background-color: #0a0b10;
            color: #f0f3fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #12131b;
            border: 1px solid #00e2ff;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 226, 255, 0.2);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #00e2ff;
            font-size: 20px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        p {
            color: #a0a0a0;
            font-size: 13px;
            margin-bottom: 25px;
        }
        .key-box {
            background-color: #1c1e2b;
            border: 1px solid #1c1e2b;
            padding: 12px;
            font-family: monospace;
            font-size: 16px;
            color: #fff;
            border-radius: 4px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        .btn {
            background-color: #00e2ff;
            color: #0a0b10;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #00b5cc;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NOWA ENGINE ACCESS KEY</h1>
    <p>Скопируйте ключ ниже и вставьте в инжектор внутри игры.</p>
    
    <!-- Сюда будет выводиться сгенерированный ключ -->
    <div class="key-box" id="key-container">Загрузка...</div>
    
    <button class="btn" onclick="copyKey()">Скопировать ключ</button>
</div>

<script>
    // Функция генерации ключа на основе текущей даты (меняется раз в сутки)
    function generateDailyKey() {
        const date = new Date();
        const year = date.getUTCFullYear();
        const month = date.getUTCMonth() + 1;
        const day = date.getUTCDate();
        
        // Простая маска для создания уникальной строки ключа
        const rawString = "NOWA_KEY_" + year + "_" + month + "_" + day + "_SECURE";
        
        // Превращаем строку в простой хэш (Base64), чтобы ключ не выглядел очевидным
        return btoa(rawString).substring(0, 16); 
    }

    // Отображаем ключ на странице
    const currentKey = generateDailyKey();
    document.getElementById('key-container').innerText = currentKey;

    function copyKey() {
        navigator.clipboard.writeText(currentKey);
        alert("Ключ успешно скопирован!");
    }
</script>
</body>
</html>
