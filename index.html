<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowa Engine - Key System</title>
    <style>
        body {
            background-color: #0a0b10;
            color: #f0f3fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #12131b;
            border: 1px solid #8c96aa;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(140, 150, 170, 0.15);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #8c96aa;
            font-size: 20px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        p {
            color: #a0a0a0;
            font-size: 13px;
            margin-bottom: 25px;
        }
        .key-box {
            background-color: #1c1e2b;
            border: 1px solid #1c1e2b;
            padding: 12px;
            font-family: monospace;
            font-size: 16px;
            color: #fff;
            border-radius: 4px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        .btn {
            background-color: #8c96aa;
            color: #0a0b10;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #6e788a;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NOWA ENGINE ACCESS KEY</h1>
    <p>Copy the key below and paste it into the UI in-game.</p>
    
    <div class="key-box" id="key-container">Loading...</div>
    
    <button class="btn" onclick="copyKey()">Copy Key</button>
</div>

<script>
    // Полностью синхронизированный алгоритм генерации с Lua (UTC)
    function generateDailyKey() {
        const date = new Date();
        const year = date.getUTCFullYear();
        const month = date.getUTCMonth() + 1;
        const day = date.getUTCDate();
        
        const rawString = "NOWA_KEY_" + year + "_" + month + "_" + day + "_SECURE";
        
        // Стандартный алгоритм кодирования строки в валидный Base64
        const b64 = btoa(unescape(encodeURIComponent(rawString)));
        return b64.substring(0, 16); 
    }

    const currentKey = generateDailyKey();
    document.getElementById('key-container').innerText = currentKey;

    function copyKey() {
        navigator.clipboard.writeText(currentKey);
        alert("Key copied to clipboard!");
    }
</script>
</body>
</html>
